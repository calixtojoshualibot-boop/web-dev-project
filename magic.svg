<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0a0a15"/></linearGradient></defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Cap brim -->
  <ellipse cx="200" cy="290" rx="160" ry="30" fill="#000" stroke="#333" stroke-width="2"/>
  <ellipse cx="200" cy="285" rx="155" ry="25" fill="#111"/>
  <!-- Cap crown -->
  <ellipse cx="200" cy="200" rx="130" ry="110" fill="#0077C0"/>
  <ellipse cx="200" cy="190" rx="120" ry="95" fill="#005a9e"/>
  <!-- Pinstripes -->
  <line x1="140" y1="120" x2="140" y2="280" stroke="#0088dd" stroke-width="1" opacity="0.4"/>
  <line x1="160" y1="110" x2="160" y2="280" stroke="#0088dd" stroke-width="1" opacity="0.4"/>
  <line x1="180" y1="105" x2="180" y2="280" stroke="#0088dd" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="100" x2="200" y2="280" stroke="#0088dd" stroke-width="1" opacity="0.4"/>
  <line x1="220" y1="105" x2="220" y2="280" stroke="#0088dd" stroke-width="1" opacity="0.4"/>
  <line x1="240" y1="110" x2="240" y2="280" stroke="#0088dd" stroke-width="1" opacity="0.4"/>
  <line x1="260" y1="120" x2="260" y2="280" stroke="#0088dd" stroke-width="1" opacity="0.4"/>
  <!-- Star logo -->
  <polygon points="200,130 210,160 240,160 216,178 225,208 200,192 175,208 184,178 160,160 190,160" fill="#C4CED4" stroke="#fff" stroke-width="1"/>
  <!-- Button on top -->
  <circle cx="200" cy="100" r="10" fill="#000" stroke="#333" stroke-width="1"/>
  <!-- Stitching -->
  <path d="M100 220 Q200 260 300 220" fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
</svg>
